<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Внести оплату</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #ffffff;
  --card: #f4f4f8;
  --border: #dde0e7;
  --text: #1a1a2e;
  --hint: #8a8fa8;
  --primary: #4a6cf7;
  --primary-light: #eef0fd;
  --danger: #e53935;
  --green: #2e7d32;
  --green-light: #e8f5e9;
  --radius: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #17212b;
    --card: #232e3c;
    --border: #2e3d4f;
    --text: #e8edf2;
    --hint: #7d8fa0;
    --primary-light: #1e2d4a;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* Header */
.header {
  background: var(--primary);
  color: #fff;
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon { font-size: 22px; }
.header h1 { font-size: 17px; font-weight: 700; }
.header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

/* Form sections */
.section {
  margin: 12px 14px 0;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--hint);
  padding: 10px 14px 4px;
}
.field {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.field:last-child { border-bottom: none; }
.field-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
.field-body { flex: 1; min-width: 0; }
.field-body label {
  display: block;
  font-size: 11px;
  color: var(--hint);
  margin-bottom: 3px;
}
.field-body input,
.field-body select,
.field-body textarea {
  width: 100%;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  padding: 0;
}
.field-body textarea { resize: none; height: 56px; }
.field-body input[type="number"] { font-weight: 700; font-size: 18px; }
.field-body select { cursor: pointer; }
option { background: var(--card); }

/* Amount big display */
.amount-display {
  margin: 14px 14px 0;
  background: var(--primary-light);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.amount-display .amount-label {
  font-size: 12px;
  color: var(--hint);
  margin-bottom: 4px;
}
.amount-display .amount-value {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
}

/* Bottom button */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.submit-btn {
  width: 100%;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity .15s;
}
.submit-btn:active { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Success screen */
.success-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 30px;
  text-align: center;
  z-index: 999;
}
.success-screen.show { display: flex; }
.success-screen .icon { font-size: 72px; }
.success-screen h2 { font-size: 22px; font-weight: 800; color: var(--green); }
.success-screen p { font-size: 15px; color: var(--hint); line-height: 1.5; }
.success-screen .close-btn {
  margin-top: 10px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 32px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}

/* Quick amounts */
.quick-amounts {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.qa-btn {
  background: var(--primary-light);
  color: var(--primary);
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.qa-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">💰</div>
  <div>
    <h1>Внести оплату</h1>
    <p>Учёт поставок</p>
  </div>
</div>

<!-- Amount display -->
<div class="amount-display">
  <div class="amount-label">Сумма к записи</div>
  <div class="amount-value" id="amountDisplay">0 ₽</div>
</div>

<!-- Contractor -->
<div class="section-label">Контрагент</div>
<div class="section">
  <div class="field">
    <div class="field-icon">🏢</div>
    <div class="field-body">
      <label>Название / имя</label>
      <input type="text" id="contractorInput" placeholder="Введите контрагента..." autocomplete="off">
    </div>
  </div>
</div>

<!-- Payment details -->
<div class="section-label">Детали оплаты</div>
<div class="section">
  <div class="field">
    <div class="field-icon">📅</div>
    <div class="field-body">
      <label>Дата оплаты</label>
      <input type="date" id="dateInput">
    </div>
  </div>
  <div class="field">
    <div class="field-icon">💵</div>
    <div class="field-body">
      <label>Сумма (руб.)</label>
      <input type="number" id="amountInput" inputmode="numeric" placeholder="0"
             oninput="updateAmountDisplay()">
    </div>
  </div>
  <div class="field">
    <div class="field-icon">📝</div>
    <div class="field-body">
      <label>За что</label>
      <input type="text" id="purposeInput" placeholder="Напр: Оплата за поставку №12..." autocomplete="off">
    </div>
  </div>
  <div class="field">
    <div class="field-icon">🏦</div>
    <div class="field-body">
      <label>Способ оплаты</label>
      <select id="payMethodSelect">
        <option value="Наличные">💵 Наличные</option>
        <option value="Перевод">📲 Перевод / Безнал</option>
        <option value="Карта">💳 Карта</option>
        <option value="Другое">🔄 Другое</option>
      </select>
    </div>
  </div>
</div>

<!-- Quick amounts -->
<div class="section-label">Быстрый ввод суммы</div>
<div style="padding: 0 14px 4px;">
  <div class="quick-amounts">
    <button class="qa-btn" onclick="setAmount(1000)">1 000</button>
    <button class="qa-btn" onclick="setAmount(5000)">5 000</button>
    <button class="qa-btn" onclick="setAmount(10000)">10 000</button>
    <button class="qa-btn" onclick="setAmount(25000)">25 000</button>
    <button class="qa-btn" onclick="setAmount(50000)">50 000</button>
    <button class="qa-btn" onclick="setAmount(100000)">100 000</button>
  </div>
</div>

<!-- Comment -->
<div class="section-label">Комментарий</div>
<div class="section" style="margin-bottom: 12px;">
  <div class="field">
    <div class="field-icon">💬</div>
    <div class="field-body">
      <label>Дополнительно</label>
      <textarea id="commentInput" placeholder="Необязательно..."></textarea>
    </div>
  </div>
</div>

<!-- Submit button -->
<div class="bottom-bar">
  <button class="submit-btn" id="submitBtn" onclick="submitPayment()">
    💾 Записать оплату
  </button>
</div>

<!-- Success screen -->
<div class="success-screen" id="successScreen">
  <div class="icon">✅</div>
  <h2>Оплата записана!</h2>
  <p id="successDetails">Данные успешно сохранены</p>
  <button class="close-btn" onclick="closeApp()">✕ Закрыть</button>
</div>

<script>
var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
var APPS_SCRIPT_URL = '';  // Вставьте URL Google Apps Script Web App

// Init
(function() {
  if (tg) {
    tg.ready();
    tg.expand();
    if (tg.colorScheme === 'dark') {
      document.documentElement.style.setProperty('--bg', '#17212b');
      document.documentElement.style.setProperty('--card', '#232e3c');
      document.documentElement.style.setProperty('--border', '#2e3d4f');
      document.documentElement.style.setProperty('--text', '#e8edf2');
      document.documentElement.style.setProperty('--hint', '#7d8fa0');
    }
  }

  // Set today's date as default
  var today = new Date();
  var yyyy = today.getFullYear();
  var mm   = String(today.getMonth() + 1).padStart(2, '0');
  var dd   = String(today.getDate()).padStart(2, '0');
  document.getElementById('dateInput').value = yyyy + '-' + mm + '-' + dd;

  // Pre-fill contractor from Telegram user info if available
  if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
    var u = tg.initDataUnsafe.user;
    var defaultName = (u.first_name || '') + (u.last_name ? ' ' + u.last_name : '');
    if (defaultName.trim()) {
      document.getElementById('contractorInput').placeholder = defaultName.trim() + ' (по умолчанию)';
    }
  }
})();

function updateAmountDisplay() {
  var val = parseFloat(document.getElementById('amountInput').value) || 0;
  document.getElementById('amountDisplay').textContent =
    val.toLocaleString('ru-RU') + ' ₽';
}

function setAmount(val) {
  document.getElementById('amountInput').value = val;
  updateAmountDisplay();
}

function submitPayment() {
  var contractor = document.getElementById('contractorInput').value.trim();
  var date       = document.getElementById('dateInput').value;
  var amount     = parseFloat(document.getElementById('amountInput').value) || 0;
  var purpose    = document.getElementById('purposeInput').value.trim();
  var payMethod  = document.getElementById('payMethodSelect').value;
  var comment    = document.getElementById('commentInput').value.trim();

  if (!contractor) {
    alert('Укажите контрагента');
    document.getElementById('contractorInput').focus();
    return;
  }
  if (amount <= 0) {
    alert('Укажите сумму оплаты');
    document.getElementById('amountInput').focus();
    return;
  }
  if (!purpose) {
    alert('Укажите за что произведена оплата');
    document.getElementById('purposeInput').focus();
    return;
  }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Сохраняем...';

  var data = {
    type:        'webapp_payment',
    contractor:  contractor,
    date:        date,
    amount:      amount,
    purpose:     purpose,
    payMethod:   payMethod,
    comment:     comment,
    timestamp:   new Date().toISOString()
  };

  // Send to Google Sheets if URL set
  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      mode: 'no-cors'
    }).catch(function() {});
  }

  // Show success
  var amtFormatted = amount.toLocaleString('ru-RU') + ' ₽';
  document.getElementById('successDetails').innerHTML =
    '💰 ' + amtFormatted + ' — ' + purpose + '<br>' +
    '🏢 ' + contractor + '<br>' +
    '🏦 ' + payMethod + (date ? '<br>📅 ' + formatDate(date) : '');
  document.getElementById('successScreen').classList.add('show');

  // Send data to bot
  setTimeout(function() {
    try {
      if (tg && tg.sendData) tg.sendData(JSON.stringify(data));
    } catch(e) {}
  }, 300);
}

function closeApp() {
  try { if (tg) tg.close(); } catch(e) {}
  window.close();
}

function formatDate(s) {
  if (!s) return '';
  var parts = s.split('-');
  if (parts.length !== 3) return s;
  return parts[2] + '.' + parts[1] + '.' + parts[0];
}
</script>
</body>
</html>
